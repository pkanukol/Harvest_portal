<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Harvest International School</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #29ABE2;
    --blue-dk:#1a8abf;
    --red:    #C0392B;
    --green:  #4a8c2a;
    --gray:   #f5f6f8;
    --text:   #1a1a1a;
    --muted:  #666;
  }

  body {
    font-family: "DM Sans", sans-serif;
    background: var(--gray);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .top-stripe {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--blue) 0%, var(--green) 50%, var(--red) 100%);
  }

  .login-card {
    background: #fff;
    border-radius: 20px;
    padding: 44px 40px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    text-align: center;
  }

  .logo-img {
    width: 300px;
    height: auto;
    display: block;
    margin: 0 auto 16px;
  }

  .school-name {
    font-family: "DM Serif Display", serif;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .school-sub {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .divider {
    height: 1px;
    background: #e8eaed;
    margin: 24px 0;
  }

  .sign-in-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 13px 20px;
    border-radius: 10px;
    border: 1.5px solid #dadce0;
    background: #fff;
    font-family: "DM Sans", sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
  }

  .btn-google:hover {
    background: #f8f9fa;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .btn-google:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .google-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .error-msg {
    margin-top: 16px;
    padding: 10px 14px;
    border-radius: 8px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    font-size: 13px;
    display: none;
  }

  .error-msg.show { display: block; }

  .domain-note {
    margin-top: 20px;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="top-stripe"></div>

<div class="login-card">
  <img src="logo.png" alt="Harvest International School" class="logo-img">

  <div class="school-name">Academy 360° Tools &amp; Resources</div>
  <div class="school-sub">Harvest International School</div>

  <div class="divider"></div>

  <p class="sign-in-label">Sign in with your school Google account to continue</p>

  <button class="btn-google" id="googleBtn" onclick="signIn()">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <p class="domain-note">Only @harvestinternationalschool.in accounts are allowed</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/portal/auth.js"></script>
<script>
  const btn = document.getElementById('googleBtn');
  const errorMsg = document.getElementById('errorMsg');

  // Show error if redirected back with error
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === 'domain') {
    showError('Only @harvestinternationalschool.in accounts are allowed.');
  }

  // If already logged in, go to index
  (async () => {
    const session = await getSession();
    if (session) {
      window.location.href = 'index.html';
    }
  })();

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  async function signIn() {
    btn.disabled = true;
    btn.innerHTML = btn.innerHTML.replace('Sign in with Google', 'Redirecting…');
    try {
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/portal/index.html',
          queryParams: { hd: 'harvestinternationalschool.in' }
        }
      });
      if (error) showError(error.message);
    } catch (e) {
      showError('Something went wrong. Please try again.');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
