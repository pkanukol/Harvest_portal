<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvest International School — Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #29ABE2;
    --blue-dk:#1a8abf;
    --red:    #C0392B;
    --green:  #4a8c2a;
    --green-dk:#366020;
    --gray:   #f5f6f8;
    --text:   #1a1a1a;
    --muted:  #666;
  }

  body {
    font-family: "DM Sans", sans-serif;
    background: #ffffff;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  body.ready { opacity: 1; }

  .top-stripe {
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, var(--blue) 0%, var(--green) 50%, var(--red) 100%);
  }

  header {
    width: 100%;
    padding: 10px 28px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e8eaed;
    flex-wrap: wrap;
    gap: 10px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-img {
    height: 36px;
    width: auto;
    object-fit: contain;
  }

  .academy-heading {
    font-family: "DM Serif Display", serif;
    font-size: 20px;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .academy-heading .a360 { color: #E8401C; }
  .academy-heading .rest { color: var(--blue); }

  .academy-sub {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .user-info {
    text-align: right;
  }

  .user-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .user-designation {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .btn-signout {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid #e4e7ec;
    background: #fff;
    font-family: "DM Sans", sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .btn-signout:hover { border-color: var(--red); color: var(--red); }

  main {
    flex: 1;
    width: 100%;
    max-width: 1080px;
    padding: 22px 24px 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(190px, 1fr));
    grid-template-rows: repeat(2, auto);
    grid-auto-flow: column;
    gap: 14px;
    width: 100%;
  }

  @media (max-width: 900px) {
    .card-grid { grid-template-columns: repeat(2, minmax(190px, 1fr)); grid-template-rows: repeat(4, auto); }
  }

  @media (max-width: 700px) {
    .card-grid { grid-template-columns: 1fr 1fr; grid-template-rows: none; grid-auto-flow: row; max-width: 420px; gap: 10px; }
    header { justify-content: center; }
    .academy-heading { font-size: 22px; }
    .header-right { justify-content: center; }
  }

  @media (max-width: 420px) {
    .card-grid { grid-template-columns: 1fr; max-width: 320px; }
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    text-decoration: none;
    background: #fff;
    border: 1.5px solid #e4e7ec;
    border-radius: 14px;
    padding: 18px 14px 14px;
    gap: 6px;
    justify-content: space-between;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  .card-blue::before  { background: var(--blue); }
  .card-green::before { background: var(--green); }
  .card-red::before   { background: var(--red); }

  .card-blue:hover  { border-color: var(--blue); box-shadow: 0 8px 24px rgba(41,171,226,0.14); }
  .card-green:hover { border-color: var(--green); box-shadow: 0 8px 24px rgba(74,140,42,0.14); }
  .card-red:hover   { border-color: var(--red); box-shadow: 0 8px 24px rgba(192,57,43,0.12); }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .card-blue  .card-icon { background: rgba(41,171,226,0.10); }
  .card-green .card-icon { background: rgba(74,140,42,0.10); }
  .card-red   .card-icon { background: rgba(192,57,43,0.10); }

  .card-title {
    font-family: "DM Serif Display", serif;
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.25;
  }

  .card-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-btn {
    margin-top: 2px;
    font-family: "DM Sans", sans-serif;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }

  .card-blue  .card-btn { color: var(--blue-dk); }
  .card-green .card-btn { color: var(--green-dk); }
  .card-red   .card-btn { color: var(--red); }

  .card:hover .card-btn { opacity: 0.75; }

  footer {
    width: 100%;
    padding: 18px 24px;
    border-top: 1px solid #e8eaed;
    text-align: center;
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.04em;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.show { display: flex; }

  .modal-box {
    background: #fff;
    border-radius: 14px;
    width: 100%;
    max-width: 900px;
    height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #e8eaed;
    flex-shrink: 0;
    gap: 12px;
  }

  .modal-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .modal-back {
    background: none;
    border: none;
    font-size: 13px;
    font-weight: 600;
    color: var(--blue);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .modal-back:hover { text-decoration: underline; }

  .modal-title {
    font-family: "DM Serif Display", serif;
    font-size: 16px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    color: var(--muted);
    flex-shrink: 0;
  }

  .modal-close:hover { color: var(--red); }

  .modal-body { flex: 1; overflow-y: auto; }

  .modal-body iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .doc-list { padding: 10px; }

  .doc-list-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .doc-list-item:hover { background: var(--gray); }

  .doc-list-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(41,171,226,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .doc-list-title {
    font-family: "DM Serif Display", serif;
    font-size: 14px;
    color: var(--text);
  }

  .doc-list-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="top-stripe"></div>

<header>
  <div class="header-left">
    <div class="logo-wrap">
      <img src="logo.png"
           alt="Harvest International School" class="logo-img">
    </div>
    <div>
      <div class="academy-heading"><span class="a360">ACADEMY 360°</span> <span class="rest">Tools &amp; Resources</span></div>
      <div class="academy-sub">Education Beyond Classrooms</div>
    </div>
  </div>

  <div class="header-right">
    <div class="user-info" id="userInfo" style="display:none">
      <div class="user-name" id="userName"></div>
      <div class="user-designation" id="userDesignation"></div>
    </div>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>
  </div>
</header>

<main>
  <div class="card-grid" id="cardGrid"></div>
</main>

<div class="modal-overlay" id="previewModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-left">
        <button class="modal-back" id="modalBackBtn" style="display:none" onclick="backToList()">← Back</button>
        <div class="modal-title" id="previewTitle"></div>
      </div>
      <button class="modal-close" onclick="closePreview()">&times;</button>
    </div>
    <div class="modal-body" id="previewBody"></div>
  </div>
</div>

<footer>
  © 2025 Harvest International School &nbsp;·&nbsp; Education Beyond Classrooms
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/portal/auth.js"></script>
<script>
  // Classroom Observation app runs on the local Vite dev server when the portal itself
  // is being served locally, so local testing doesn't get bounced to production.
  const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);
  const CLASSROOM_APP_URL = IS_LOCAL ? 'http://localhost:5173' : 'https://harvest-dlp-portal.onrender.com';

  // Order matters: with grid-auto-flow: column (see .card-grid CSS), the grid fills
  // top-to-bottom within a column before moving to the next column. Grouped in pairs
  // here so related apps land in the same column, one above the other.
  const APPS = [
    {
      id: 'dashboard',
      title: 'CCT Live Dashboard',
      desc: 'View real-time analytics and performance insights from CCT observations across grades.',
      icon: '📊',
      color: 'green',
      href: 'https://script.google.com/a/macros/harvestinternationalschool.in/s/AKfycbzsqgLeg3t_ror7gXWlpa5-Q1I5IW2elav5tJrPf2QuM1ZnFMKcIPOA4KSyScJYOmQ58w/exec',
      roles: ['teacher', 'auditor', 'sme'],
      btnLabel: 'Open Dashboard →'
    },
    {
      id: 'parent',
      title: 'Master CCT Dashboard',
      desc: 'Schedule subject CCTs, access assessment results and send reports to parents.',
      icon: '📅',
      color: 'blue',
      href: 'https://script.google.com/a/macros/harvestinternationalschool.in/s/AKfycbxVaCjoLdVvIvCAXz4hI77sx9cM2aLhpBVEwdHwqtKUCbd_j7jNUj0Mm5ECKYGTDMrAbA/exec',
      roles: ['teacher', 'auditor', 'sme'],
      btnLabel: 'Open Portal →'
    },
    {
      id: 'classroom',
      title: 'Classroom Observation',
      desc: 'Log classroom audits, view teacher performance dashboards and send observation reports.',
      icon: '🏫',
      color: 'green',
      href: CLASSROOM_APP_URL,
      roles: ['teacher', 'auditor', 'sme'],
      btnLabel: 'Open App →',
      sso: true
    },
    {
      id: 'cct',
      title: 'CCT Observation',
      desc: 'Conduct and record Critical Classroom Teaching observations using the structured form.',
      icon: '📝',
      color: 'blue',
      href: 'https://script.google.com/macros/s/AKfycbwBuGQviNUWypRfgi4huBLFiu-JqxSEbNNw6-MzrML2-VhS1eXj1rxRUDIplotOy2h3Xw/exec',
      roles: ['auditor', 'sme'],
      btnLabel: 'Open Form →'
    },
    {
      id: 'curriculum',
      title: 'Curriculum Tracker',
      desc: 'Currently on Hold.',
      icon: '📚',
      color: 'red',
      href: 'https://script.google.com/a/macros/harvestinternationalschool.in/s/AKfycbxq8CKdp_JWH6eUxLiPbwaPVJQmj9FciqYQq-zH-apQAFPjzvmb9CsckHAgmHgAizGNYg/exec',
      roles: ['teacher', 'auditor', 'sme'],
      btnLabel: 'Open Tracker →'
    },
    {
      id: 'ticket-tracker',
      title: 'Ticket Tracker',
      desc: 'Log issues related to admin, curriculum, infrastructure, HR or DLP and track them to resolution.',
      icon: '🎫',
      color: 'blue',
      href: IS_LOCAL ? 'http://localhost:5175' : 'https://harvest-tickettracker-ui.onrender.com',
      roles: 'all',
      btnLabel: 'Open Tracker →',
      sso: true
    },
    {
      id: 'sop-documents',
      title: 'SOP Documents',
      desc: 'Standard Operating Procedure documents for school processes.',
      icon: '📄',
      color: 'blue',
      isList: true,
      roles: 'all',
      btnLabel: 'View Documents →',
      documents: [
        {
          title: 'CCT SOP',
          desc: 'End-to-end process for scheduling, conducting and reporting Concept Clarity Test (CCT) results for students in Grades 5 through 12.',
          previewUrl: 'https://drive.google.com/file/d/1tnXbwhA3Wh7jm2ETqo21Bta6cNSWA6XH/preview'
        },
        {
          title: 'Classroom Observation SOP',
          desc: 'End-to-end process for logging into the Classroom Observation portal, conducting and recording a classroom observation, finalising the audit.',
          previewUrl: 'https://drive.google.com/file/d/1XKypL1GcCYYT1cTiUoOMIzCQAHlN2Gvv/preview'
       },
       {
          title: 'Claude Usage - The 12 Habit tips',
          desc: 'Claude counts tokens. Every habit in this guide tells you how to avoid wasting tokens, so you can spend them on what matters.',
          previewUrl: 'https://drive.google.com/file/d/1knc9Wfi-P5WyswZJpYQkKcNR_jHQdYCK/preview'
       },
       {
          title: 'Ticket Tracker SOP',
          desc: 'End-to-end process for raising, routing, tracking, and resolving issues or requests.',
          previewUrl: 'https://drive.google.com/file/d/1-Sk8AJB4rho11QZuDQGp6NsqxppvSAyj/preview'
       }
      ]
    },
    {
      id: 'timetable',
      title: 'Timetable',
      desc: 'View, generate and edit the school timetable.',
      icon: '🗓️',
      color: 'red',
      href: IS_LOCAL ? 'http://localhost:5174' : 'https://harvest-timetable-ui.onrender.com',
      roles: 'all',
      btnLabel: 'Open Timetable →',
      sso: true
    },
   {
      id: 'questionbank',
      title: 'Master Question Bank',
      desc: 'Create question bank for various subjects used in CCT Remedials, Workbook, Question papers.',
      icon: '🗂️',
      color: 'red',
      href: 'https://script.google.com/a/macros/harvestinternationalschool.in/s/AKfycbzoDja1TCQpDHMTLtHHqz83tKiCQ_R0IInmD2mgJJeiiADiAfEL3XDU94koWI8sp7T7Sw/exec',
      roles: ['auditor', 'sme'],
      btnLabel: 'Open Question Bank →'
    },
  ];

  let currentSession = null;

  async function init() {
    try {
      currentSession = await requireAuth();
      if (!currentSession) return;

      const email = currentSession.user.email;
      const profile = await getUserProfile(email);

      if (!profile) {
        document.getElementById('cardGrid').innerHTML =
          '<p style="color:#C0392B;font-size:14px;">Your account (' + email + ') was not found in the system. Please contact your administrator.</p>';
        document.body.classList.add('ready');
        return;
      }

    const role = profile.role.toLowerCase();

    // Show user info
    document.getElementById('userName').textContent = profile.name || email;
    document.getElementById('userDesignation').textContent = profile.designation || '';
    document.getElementById('userInfo').style.display = 'block';

    // Render visible cards
    const grid = document.getElementById('cardGrid');
    grid.innerHTML = '';

    APPS.forEach(app => {
      if (app.roles !== 'all' && !app.roles.includes(role)) return;

      const card = document.createElement('div');
      card.className = `card card-${app.color}`;
      card.style.cursor = 'pointer';
      card.innerHTML = `
        <div class="card-icon">${app.icon}</div>
        <div class="card-title">${app.title}</div>
        <div class="card-desc">${app.desc}</div>
        <div class="card-btn">${app.btnLabel}</div>
      `;

      card.addEventListener('click', () => openApp(app));
      grid.appendChild(card);
    });

      document.body.classList.add('ready');
    } catch (err) {
      console.error('Portal init error:', err);
      document.getElementById('cardGrid').innerHTML =
        '<p style="color:#C0392B;font-size:14px;">Something went wrong loading the portal. Error: ' + err.message + '</p>';
      document.body.classList.add('ready');
    }
  }

  let activeListApp = null;

  function openDocList(app) {
    activeListApp = app;
    document.getElementById('modalBackBtn').style.display = 'none';
    document.getElementById('previewTitle').textContent = app.title;
    renderDocList(app.documents);
    document.getElementById('previewModal').classList.add('show');
  }

  function renderDocList(documents) {
    const body = document.getElementById('previewBody');
    body.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'doc-list';
    documents.forEach(doc => {
      const item = document.createElement('div');
      item.className = 'doc-list-item';
      item.innerHTML = `
        <div class="doc-list-icon">📄</div>
        <div>
          <div class="doc-list-title">${doc.title}</div>
          <div class="doc-list-desc">${doc.desc}</div>
        </div>
      `;
      item.addEventListener('click', () => openDocFromList(doc));
      list.appendChild(item);
    });
    body.appendChild(list);
  }

  function openDocFromList(doc) {
    document.getElementById('previewTitle').textContent = doc.title;
    document.getElementById('modalBackBtn').style.display = 'inline-block';
    const body = document.getElementById('previewBody');
    body.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.src = doc.previewUrl;
    iframe.setAttribute('allow', 'autoplay');
    body.appendChild(iframe);
  }

  function backToList() {
    document.getElementById('modalBackBtn').style.display = 'none';
    document.getElementById('previewTitle').textContent = activeListApp.title;
    renderDocList(activeListApp.documents);
  }

  function closePreview() {
    document.getElementById('previewModal').classList.remove('show');
    document.getElementById('previewBody').innerHTML = '';
    activeListApp = null;
  }

  /*async function openApp(app) {
    if (app.isList) {
      openDocList(app);
      return;
    }
    if (app.sso) {
      // Pass Supabase token so AuditApp can auto-login
      const session = await getSession();
      const token = session?.access_token;
      if (!token) { window.location.href = 'login.html'; return; }
      window.open(app.href + '?sso=' + encodeURIComponent(token), '_blank');
    } else {
      window.open(app.href, '_blank');
    }
  }*/
async function openApp(app) {
  if (app.isList) {
    openDocList(app);
    return;
  }
  if (app.sso) {
    const session = await getSession();
    const token = session?.access_token;
    if (!token) {
      window.location.href = 'login.html';
      return;
    }
    window.location.href = app.href + '?sso=' + encodeURIComponent(token);
  } else {
    window.open(app.href, '_blank');
  }
}

  init();
</script>
</body>
</html>
