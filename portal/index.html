<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvest International School — Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #29ABE2;
    --blue-dk:#1a8abf;
    --red:    #C0392B;
    --green:  #4a8c2a;
    --green-dk:#366020;
    --gray:   #f5f6f8;
    --text:   #1a1a1a;
    --muted:  #666;
  }

  body {
    font-family: "DM Sans", sans-serif;
    background: #ffffff;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  body.ready { opacity: 1; }

  .top-stripe {
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, var(--blue) 0%, var(--green) 50%, var(--red) 100%);
  }

  header {
    width: 100%;
    padding: 20px 32px 18px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e8eaed;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-img {
    height: 56px;
    width: auto;
    object-fit: contain;
  }

  .academy-heading {
    font-family: "DM Serif Display", serif;
    font-size: 30px;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .academy-heading .a360 { color: #E8401C; }
  .academy-heading .rest { color: var(--blue); }

  .academy-sub {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .user-info {
    text-align: right;
  }

  .user-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .user-designation {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .btn-signout {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid #e4e7ec;
    background: #fff;
    font-family: "DM Sans", sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .btn-signout:hover { border-color: var(--red); color: var(--red); }

  main {
    flex: 1;
    width: 100%;
    max-width: 900px;
    padding: 28px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    width: 100%;
  }

  @media (max-width: 700px) {
    .card-grid { grid-template-columns: 1fr; max-width: 360px; }
    header { justify-content: center; }
    .academy-heading { font-size: 22px; }
    .header-right { justify-content: center; }
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    text-decoration: none;
    background: #fff;
    border: 1.5px solid #e4e7ec;
    border-radius: 18px;
    padding: 36px 20px 28px;
    gap: 14px;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 18px 18px 0 0;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.10);
  }

  .card-blue::before  { background: var(--blue); }
  .card-green::before { background: var(--green); }
  .card-red::before   { background: var(--red); }

  .card-blue:hover  { border-color: var(--blue); box-shadow: 0 12px 40px rgba(41,171,226,0.15); }
  .card-green:hover { border-color: var(--green); box-shadow: 0 12px 40px rgba(74,140,42,0.15); }
  .card-red:hover   { border-color: var(--red); box-shadow: 0 12px 40px rgba(192,57,43,0.13); }

  .card-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }

  .card-blue  .card-icon { background: rgba(41,171,226,0.10); }
  .card-green .card-icon { background: rgba(74,140,42,0.10); }
  .card-red   .card-icon { background: rgba(192,57,43,0.10); }

  .card-title {
    font-family: "DM Serif Display", serif;
    font-size: 17px;
    color: var(--text);
    line-height: 1.25;
  }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    flex: 1;
  }

  .card-btn {
    margin-top: 6px;
    padding: 9px 22px;
    border-radius: 30px;
    font-family: "DM Sans", sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: none;
    cursor: pointer;
    transition: opacity 0.18s;
    color: #fff;
  }

  .card-blue  .card-btn { background: var(--blue); }
  .card-green .card-btn { background: var(--green); }
  .card-red   .card-btn { background: var(--red); }

  .card:hover .card-btn { opacity: 0.88; }

  footer {
    width: 100%;
    padding: 18px 24px;
    border-top: 1px solid #e8eaed;
    text-align: center;
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.04em;
  }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/portal/auth.js"></script>
<script>
  const APPS = [
    {
      id: 'dashboard',
      title: 'CCT Live Dashboard',
      desc: 'View real-time analytics and performance insights from CCT observations across grades.',
      icon: '📊',
      color: 'green',
      href: 'https://script.google.com/macros/s/AKfycbyUOowu_Polb8kvZ72oWe_Yx7iILDMMgO-2i0ZOvdEq_Q__iJovxgu9BIdFlKOR8yj5/exec',
      roles: ['teacher', 'auditor', 'sme'],
      btnLabel: 'Open Dashboard →'
    },
    {
      id: 'classroom',
      title: 'Classroom Observation',
      desc: 'Log classroom audits, view teacher performance dashboards and send observation reports.',
      icon: '🏫',
      color: 'green',
      href: 'http://localhost:5173',
      roles: ['teacher', 'auditor', 'sme'],
      btnLabel: 'Open App →',
      sso: true
    },
    {
      id: 'curriculum',
      title: 'Curriculum Tracker',
      desc: 'Track curriculum coverage, pacing and progress across grades and subjects.',
      icon: '📚',
      color: 'red',
      href: 'https://script.google.com/a/macros/harvestinternationalschool.in/s/AKfycbxq8CKdp_JWH6eUxLiPbwaPVJQmj9FciqYQq-zH-apQAFPjzvmb9CsckHAgmHgAizGNYg/exec',
      roles: ['teacher', 'auditor', 'sme'],
      btnLabel: 'Open Tracker →'
    },
    {
      id: 'parent',
      title: 'Master CCT Dashboard',
      desc: 'Schedule subject CCTs, access assessment results and send reports to parents.',
      icon: '📅',
      color: 'blue',
      href: 'https://script.google.com/a/macros/harvestinternationalschool.in/s/AKfycbxVaCjoLdVvIvCAXz4hI77sx9cM2aLhpBVEwdHwqtKUCbd_j7jNUj0Mm5ECKYGTDMrAbA/exec',
      roles: ['teacher', 'auditor', 'sme'],
      btnLabel: 'Open Portal →'
    },
    {
      id: 'cct',
      title: 'CCT Observation',
      desc: 'Conduct and record Critical Classroom Teaching observations using the structured form.',
      icon: '📝',
      color: 'blue',
      href: 'https://docs.google.com/forms/d/1zA6b_o0drHV3m7866UVpYCAGQ8qAuPCLnCUHOfA9XmI/previewResponse',
      roles: ['auditor', 'sme'],
      btnLabel: 'Open Form →'
    }
  ];

  let currentSession = null;

  async function init() {
    try {
      currentSession = await requireAuth();
      if (!currentSession) return;

      const email = currentSession.user.email;
      const profile = await getUserProfile(email);

      if (!profile) {
        document.getElementById('cardGrid').innerHTML =
          '<p style="color:#C0392B;font-size:14px;">Your account (' + email + ') was not found in the system. Please contact your administrator.</p>';
        document.body.classList.add('ready');
        return;
      }

    const role = profile.role.toLowerCase();

    // Show user info
    document.getElementById('userName').textContent = profile.name || email;
    document.getElementById('userDesignation').textContent = profile.designation || '';
    document.getElementById('userInfo').style.display = 'block';

    // Render visible cards
    const grid = document.getElementById('cardGrid');
    grid.innerHTML = '';

    APPS.forEach(app => {
      if (!app.roles.includes(role)) return;

      const card = document.createElement('div');
      card.className = `card card-${app.color}`;
      card.style.cursor = 'pointer';
      card.innerHTML = `
        <div class="card-icon">${app.icon}</div>
        <div class="card-title">${app.title}</div>
        <div class="card-desc">${app.desc}</div>
        <div class="card-btn">${app.btnLabel}</div>
      `;

      card.addEventListener('click', () => openApp(app));
      grid.appendChild(card);
    });

      document.body.classList.add('ready');
    } catch (err) {
      console.error('Portal init error:', err);
      document.getElementById('cardGrid').innerHTML =
        '<p style="color:#C0392B;font-size:14px;">Something went wrong loading the portal. Error: ' + err.message + '</p>';
      document.body.classList.add('ready');
    }
  }

  async function openApp(app) {
    if (app.sso) {
      // Pass Supabase token so AuditApp can auto-login
      const session = await getSession();
      const token = session?.access_token;
      if (!token) { window.location.href = 'login.html'; return; }
      window.open(app.href + '?sso=' + encodeURIComponent(token), '_blank');
    } else {
      window.open(app.href, '_blank');
    }
  }
