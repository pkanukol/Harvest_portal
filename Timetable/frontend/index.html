<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Harvest International School — Timetable</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // SSO: exchange the portal's Supabase token for a Timetable JWT before React starts.
      (function () {
        const ssoToken = new URLSearchParams(location.search).get("sso");
        if (!ssoToken || localStorage.getItem("token")) {
          if (ssoToken) history.replaceState({}, "", location.pathname);
          return;
        }
        var apiBase = "%VITE_API_URL%";
        if (apiBase.indexOf("%VITE_API_URL%") !== -1) apiBase = "";
        // Never fall back to localhost unless we're actually running on
        // localhost ourselves - this no longer trusts the build-time
        // substitution alone, so a missing/stale env var can't send a real
        // visitor to a dev-only URL.
        var isLocalDev = location.hostname === "localhost" || location.hostname === "127.0.0.1";
        var portalUrl = "%VITE_PORTAL_URL%";
        if (portalUrl.indexOf("%VITE_PORTAL_URL%") !== -1) {
          portalUrl = isLocalDev ? "http://localhost:3000/portal/login.html" : "https://harvest-portal.onrender.com/portal/login.html";
        }
        fetch(apiBase + "/api/auth/sso", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ supabase_token: ssoToken }),
        })
          .then(function (r) {
            if (!r.ok) throw new Error("SSO endpoint returned " + r.status);
            return r.json();
          })
          .then(function (data) {
            if (data.access_token) {
              localStorage.setItem("token", data.access_token);
              localStorage.setItem("user", JSON.stringify({
                name: data.name, email: data.email, access_level: data.access_level, role: data.role,
                designation: data.designation, teacher_id: data.teacher_id,
              }));
            }
            location.replace(location.pathname);
          })
          .catch(function (err) {
            console.error("Timetable SSO exchange failed:", err);
            location.href = portalUrl;
          });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
