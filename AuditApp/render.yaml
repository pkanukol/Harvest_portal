services:
  # ── Backend API (FastAPI) ─────────────────────────────────────
  - type: web
    name: harvest-auditapp-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres:HARVEST2011sch%40l@db.aouvxdfamzprykezeovl.supabase.co:5432/postgres?sslmode=require
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: pavani.k@harvestinternationalschool.in
      - key: SMTP_PASSWORD
        value: ""          # fill in your Gmail App Password in the Render dashboard
      - key: SMTP_FROM_EMAIL
        value: pavani.k@harvestinternationalschool.in

  # ── Frontend (React / Vite static site) ──────────────────────
  - type: web
    name: harvest-auditapp-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://harvest-auditapp-api.onrender.com   # update after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
